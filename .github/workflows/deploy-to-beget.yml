name: Deploy to Beget

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Show debug info
      run: |
        echo "=== Local files ==="
        ls -la
        echo ""
        echo "=== Checking 'Подойдёт' ==="
        grep -n "Подойдёт" index.html || echo "Not found locally"
        
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "SSH key saved"
        
    - name: Test SSH connection and get absolute path
      run: |
        echo "=== Testing SSH connection ==="
        
        # Подключаемся и получаем абсолютный путь
        ABSOLUTE_PATH=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }} \
          "cd ../aiagentsetup/public_html && pwd")
        
        echo "Absolute path: $ABSOLUTE_PATH"
        echo "ABSOLUTE_PATH=$ABSOLUTE_PATH" >> $GITHUB_ENV
        
    - name: Deploy files with scp (absolute path)
      run: |
        echo "=== Deploying with scp (absolute path) ==="
        echo "Absolute path: $ABSOLUTE_PATH"
        echo ""
        
        # Копируем файлы по одному
        echo "Copying index.html..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          index.html ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$ABSOLUTE_PATH/"
        
        echo "Copying style.css..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          style.css ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$ABSOLUTE_PATH/"
        
        echo "Copying robots.txt..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          robots.txt ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$ABSOLUTE_PATH/"
        
        echo "Copying sitemap.xml..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          sitemap.xml ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$ABSOLUTE_PATH/"
        
        echo "Copying README.md..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          README.md ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$ABSOLUTE_PATH/"
        
        echo "✅ All files copied!"
        
    - name: Verify deployment
      run: |
        echo "=== Verifying deployment ==="
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }} \
          "cd '$ABSOLUTE_PATH' && ls -la && echo '' && echo 'Checking Подойдёт:' && grep -n 'Подойдёт' index.html && echo '✅ SUCCESS!' || echo '❌ FAILED!'"