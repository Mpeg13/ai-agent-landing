name: Deploy to Beget

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Show debug info
      run: |
        echo "=== Local files ==="
        ls -la
        echo ""
        echo "=== Checking 'Подойдёт' ==="
        grep -n "Подойдёт" index.html || echo "Not found locally"
        
    - name: Deploy via SSH - SIMPLE METHOD
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        port: 22
        script: |
          echo "=== SIMPLE DEPLOYMENT ==="
          echo "User: $(whoami)"
          echo "Current dir: $(pwd)"
          echo ""
          
          # Переходим в домашнюю директорию
          cd ~
          echo "Home dir: $(pwd)"
          echo ""
          
          # Проверяем что есть папка aiagentsetup
          echo "Checking aiagentsetup folder..."
          if [ -d "aiagentsetup" ]; then
            echo "✅ aiagentsetup folder exists"
            echo "Contents:"
            ls -la aiagentsetup/
          else
            echo "❌ aiagentsetup folder does NOT exist"
            exit 1
          fi
          echo ""
          
          # Переходим в public_html
          cd aiagentsetup/public_html
          echo "Now in: $(pwd)"
          echo "Current contents:"
          ls -la
          echo ""
          
          # Очищаем старые файлы сайта
          echo "Cleaning old site files..."
          rm -f *.html *.css *.txt *.xml *.md 2>/dev/null || true
          echo "After cleanup:"
          ls -la
          echo ""
          
          # Создаем ПРОСТОЙ тестовый файл
          echo "Creating test index.html..."
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Test Deployment</title>
          </head>
          <body>
            <h1>✅ GitHub Actions Deployment WORKS!</h1>
            <p>Date: $(date)</p>
            <p>Path: $(pwd)</p>
            <p>User: $(whoami)</p>
            <h3>Подойдёт ли ИИ-агент именно для ваших задач?</h3>
            <p>YES! This text contains "Подойдёт"</p>
          </body>
          </html>
          EOF
          
          echo "✅ Test file created"
          echo ""
          echo "=== VERIFICATION ==="
          echo "Files:"
          ls -la
          echo ""
          echo "index.html content (first 10 lines):"
          head -10 index.html
          echo ""
          echo "Checking for 'Подойдёт':"
          if grep -q "Подойдёт" index.html; then
            echo "✅ 'Подойдёт' FOUND!"
            grep -n "Подойдёт" index.html
          else
            echo "❌ 'Подойдёт' NOT FOUND!"
          fi
          echo ""
          echo "🎉 SIMPLE DEPLOYMENT COMPLETE!"
          echo "Site: https://aiagentsetup.ru"