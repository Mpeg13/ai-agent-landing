name: Deploy to Beget

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Debug info
      run: |
        echo "=== Local files ==="
        ls -la
        echo ""
        echo "=== Checking 'Подойдёт' ==="
        grep -n "Подойдёт" index.html || echo "Not found in local file"
        
    - name: Deploy ALL files at once
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        port: 22
        script: |
          echo "🚀 STARTING DEPLOYMENT"
          echo "Target: ${{ secrets.BEGET_TARGET_PATH }}"
          echo ""
          
          # Создаем целевую папку если нет
          mkdir -p "${{ secrets.BEGET_TARGET_PATH }}"
          
          # Очищаем СТАРЫЕ файлы сайта (но не .git если есть)
          echo "Cleaning old files..."
          cd "${{ secrets.BEGET_TARGET_PATH }}"
          rm -f *.html *.css *.txt *.xml *.md 2>/dev/null || true
          
          echo "Ready to receive files..."
          
          # === ФАЙЛ 1: index.html ===
          cat > index.html << 'EOFINDEX'
          $(cat index.html)
          EOFINDEX
          echo "✓ index.html created"
          
          # === ФАЙЛ 2: style.css ===
          cat > style.css << 'EOFSTYLE'
          $(cat style.css)
          EOFSTYLE
          echo "✓ style.css created"
          
          # === ФАЙЛ 3: robots.txt ===
          cat > robots.txt << 'EOFROBOTS'
          $(cat robots.txt)
          EOFROBOTS
          echo "✓ robots.txt created"
          
          # === ФАЙЛ 4: sitemap.xml ===
          cat > sitemap.xml << 'EOFSITEMAP'
          $(cat sitemap.xml)
          EOFSITEMAP
          echo "✓ sitemap.xml created"
          
          # === ФАЙЛ 5: README.md ===
          cat > README.md << 'EOFREADME'
          $(cat README.md)
          EOFREADME
          echo "✓ README.md created"
          
          echo ""
          echo "=== VERIFICATION ==="
          echo "Files in target:"
          ls -la
          echo ""
          echo "index.html lines: \$(wc -l < index.html)"
          echo "Checking 'Подойдёт':"
          grep -n "Подойдёт" index.html && echo "✅ SUCCESS!" || echo "❌ FAILED!"
          
          echo ""
          echo "🎉 DEPLOYMENT COMPLETE!"
          echo "Site: https://aiagentsetup.ru"