name: Deploy to Beget

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Debug - Show secrets info (masked)
      run: |
        echo "BEGET_HOST length: ${#BEGET_HOST}"
        echo "BEGET_USER length: ${#BEGET_USER}"
        echo "BEGET_TARGET_PATH length: ${#BEGET_TARGET_PATH}"
        echo "BEGET_SSH_KEY length: ${#BEGET_SSH_KEY}"
        echo "First 10 chars of SSH key: ${BEGET_SSH_KEY:0:10}"
        
    - name: Test SSH connection
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        port: 22
        script: |
          echo "✅ SSH connection successful!"
          echo "Current directory: $(pwd)"
          echo "User: $(whoami)"
          echo "Checking target path: ${{ secrets.BEGET_TARGET_PATH }}"
          if [ -d "${{ secrets.BEGET_TARGET_PATH }}" ]; then
            echo "✅ Target directory exists"
            ls -la "${{ secrets.BEGET_TARGET_PATH }}/" | head -10
          else
            echo "❌ Target directory does not exist or is not accessible"
          fi
      
    - name: Prepare files for deployment
      run: |
        echo "=== Creating deployment directory ==="
        mkdir -p deploy_temp
        # Копируем только нужные файлы сайта
        cp -r *.html *.css *.txt *.xml README.md deploy_temp/ 2>/dev/null || true
        echo "=== Files in deploy_temp ==="
        ls -la deploy_temp/
        echo ""
        echo "=== Checking index.html (lines 255-265) ==="
        head -265 index.html | tail -10 | grep -n "Подойдет\|Подойдёт"
        
    - name: Create target directory if not exists
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        port: 22
        script: |
          echo "Checking target directory: ${{ secrets.BEGET_TARGET_PATH }}"
          if [ ! -d "${{ secrets.BEGET_TARGET_PATH }}" ]; then
            echo "Creating directory: ${{ secrets.BEGET_TARGET_PATH }}"
            mkdir -p "${{ secrets.BEGET_TARGET_PATH }}"
            echo "Directory created"
          else
            echo "Directory already exists"
          fi
          echo "Current files in target directory:"
          ls -la "${{ secrets.BEGET_TARGET_PATH }}/" 2>/dev/null || echo "Directory empty or not accessible"
          
    - name: Deploy to Beget via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        port: 22
        source: "deploy_temp/*"
        target: ${{ secrets.BEGET_TARGET_PATH }}
        strip_components: 0
        overwrite: true
        rm: false  # НЕ удаляем старые файлы, только перезаписываем
        
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.BEGET_HOST }}
        username: ${{ secrets.BEGET_USER }}
        key: ${{ secrets.BEGET_SSH_KEY }}
        port: 22
        script: |
          echo "✅ Deployment verification:"
          echo "Current directory: $(pwd)"
          echo "Target path: ${{ secrets.BEGET_TARGET_PATH }}"
          echo ""
          echo "=== Files in target directory ==="
          ls -la "${{ secrets.BEGET_TARGET_PATH }}/" 2>/dev/null || echo "Directory not accessible"
          echo ""
          echo "=== Checking for website files ==="
          if [ -f "${{ secrets.BEGET_TARGET_PATH }}/index.html" ]; then
            echo "✅ index.html exists"
            echo "Content around line 258:"
            head -260 "${{ secrets.BEGET_TARGET_PATH }}/index.html" | tail -5
          else
            echo "❌ index.html NOT FOUND!"
            echo "Trying to find any .html files:"
            find "${{ secrets.BEGET_TARGET_PATH }}/" -name "*.html" -type f 2>/dev/null | head -5
          fi
          echo ""
          echo "Site should be available at: https://aiagentsetup.ru"