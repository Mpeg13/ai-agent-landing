name: Deploy to Beget

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Show debug info
      run: |
        echo "=== Local files ==="
        ls -la
        echo ""
        echo "=== Checking 'Подойдёт' ==="
        grep -n "Подойдёт" index.html || echo "Not found locally"
        
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        echo "SSH key saved"
        
    - name: Clean target directory
      run: |
        echo "=== Cleaning target directory ==="
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }} \
          "cd ~/aiagentsetup/public_html && rm -f *.html *.css *.txt *.xml *.md 2>/dev/null || true && echo '✅ Directory cleaned'"
        
    - name: Deploy files with scp
      run: |
        echo "=== Deploying with scp ==="
        
        # Абсолютный путь
        TARGET_PATH="~/aiagentsetup/public_html"
        echo "Target: $TARGET_PATH"
        echo "Host: ${{ secrets.BEGET_HOST }}"
        echo "User: ${{ secrets.BEGET_USER }}"
        echo ""
        
        # Копируем файлы по одному
        echo "Copying index.html..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          index.html ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$TARGET_PATH/"
        
        echo "Copying style.css..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          style.css ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$TARGET_PATH/"
        
        echo "Copying robots.txt..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          robots.txt ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$TARGET_PATH/"
        
        echo "Copying sitemap.xml..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          sitemap.xml ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$TARGET_PATH/"
        
        echo "Copying README.md..."
        scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          README.md ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:"$TARGET_PATH/"
        
        echo "✅ All files copied!"
        
    - name: Verify deployment
      run: |
        echo "=== Verifying deployment ==="
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }} \
          "cd ~/aiagentsetup/public_html && ls -la && echo '' && echo 'Checking Подойдёт:' && grep -n 'Подойдёт' index.html && echo '✅ SUCCESS!' || echo '❌ FAILED!'"